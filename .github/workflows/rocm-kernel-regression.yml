name: ROCm Kernel Regression

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Operation mode"
        required: true
        default: "start"
        type: choice
        options:
          - start
          - wait
          - collect
          - status
          - abort
      runner_label:
        description: "Self-hosted runner label"
        required: true
        type: string
        default: "linux-gfx1151-gpu-rocm"
      config:
        description: "Kernel matrix config path"
        required: true
        type: string
        default: "config/kernel-matrix.json"
      wait_timeout_minutes:
        description: "Timeout used by wait mode"
        required: true
        type: string
        default: "180"

permissions:
  contents: read

jobs:
  rocm_kernel_regression:
    name: ROCm kernel regression (${{ inputs.mode }})
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 240
    defaults:
      run:
        shell: bash
        working-directory: /home/jenkins/dsy/IQE_SUZHOU/rocm-kernel-regression

    steps:
      - name: Show host state
        run: |
          set -euxo pipefail
          lsb_release -a || true
          uname -a
          pwd
          systemctl is-enabled rocm-kernel-regression-resume.service || true
          systemctl is-active rocm-kernel-regression-resume.service || true

      - name: Start kernel matrix in background
        if: inputs.mode == 'start'
        run: |
          set -euxo pipefail
          sudo systemd-run \
            --unit rocm-kernel-regression-start \
            --collect \
            --working-directory /home/jenkins/dsy/IQE_SUZHOU/rocm-kernel-regression \
            /home/jenkins/dsy/IQE_SUZHOU/rocm-kernel-regression/scripts/orchestrate_kernel_matrix.py \
              start \
              --config "${{ inputs.config }}" \
              --ci \
              --force
          echo "Started rocm-kernel-regression-start as a transient systemd unit."
          echo "Use mode=wait or mode=collect after reboots complete."

      - name: Wait for active run
        if: inputs.mode == 'wait'
        run: |
          set -euxo pipefail
          ./scripts/orchestrate_kernel_matrix.py wait \
            --timeout-minutes "${{ inputs.wait_timeout_minutes }}"

      - name: Print active run status
        if: inputs.mode == 'status'
        run: |
          set -euxo pipefail
          ./scripts/orchestrate_kernel_matrix.py status

      - name: Abort active run
        if: inputs.mode == 'abort'
        run: |
          set -euxo pipefail
          ./scripts/orchestrate_kernel_matrix.py abort

      - name: Generate or refresh latest report
        if: inputs.mode == 'collect'
        run: |
          set -euxo pipefail
          RUN_ID="$(date -u +%Y%m%dT%H%M%SZ)-github-collect"
          mkdir -p "reports/${RUN_ID}"
          STATE_ARGS=()
          if [ -f ./state/current-run.json ]; then
            STATE_ARGS=(--state ./state/current-run.json)
          fi
          python3 ./scripts/summarize_matrix.py \
            --config "${{ inputs.config }}" \
            "${STATE_ARGS[@]}" \
            --output-dir "reports/${RUN_ID}"
          rm -f reports/latest
          ln -s "${RUN_ID}" reports/latest

      - name: Append job summary
        if: inputs.mode == 'wait' || inputs.mode == 'collect' || inputs.mode == 'status'
        run: |
          set -euo pipefail
          if [ -f reports/latest/summary.md ]; then
            cat reports/latest/summary.md >> "${GITHUB_STEP_SUMMARY}"
          elif [ -f state/current-run.json ]; then
            {
              echo "## ROCm Kernel Regression State"
              echo '```json'
              cat state/current-run.json
              echo '```'
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "No report or state file found." >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload reports
        if: inputs.mode == 'wait' || inputs.mode == 'collect'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rocm-kernel-regression-report
          path: /home/jenkins/dsy/IQE_SUZHOU/rocm-kernel-regression/reports/latest/
          if-no-files-found: warn
